<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Arena FPS</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud" aria-live="polite">
      <div id="status">Click to lock pointer. Arrow keys to move. Space to shoot.</div>
      <div id="debug" style="margin-top: 8px; opacity: 0.85;"></div>
      <div id="health">
        <span>Player: <strong id="playerHp">100</strong></span>
        <span style="margin-left: 12px;">Opponent: <strong id="opponentHp">100</strong></span>
      </div>
      <div id="gameOver" style="display: none;">
        <div id="gameOverText"></div>
        <button id="restartBtn" type="button">Restart</button>
      </div>
    </div>
    <div id="crosshair" aria-hidden="true"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
